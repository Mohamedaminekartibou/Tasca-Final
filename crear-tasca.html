<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="lado">
        <h2>Menú</h2>
        <nav>
        <ul>
            <li><a href="index.html">Llistat d'Activitats</a></li>
            <li><a href="crear-tasca.html">Crear Tasca</a></li>
            <li><a href="categories.html">Gestió de Categories</a></li>
        </ul>
        </nav>
    </aside>


    <section class="content">

        <h1>Crear Nova Tasca</h1>

        <section class="tascaNov">
            <form class="form">

                <div class="field">
                    <label>Títol</label>
                    <input type="text">
                </div>

                <div class="field">
                    <label>Descripció</label>
                    <textarea></textarea>
                </div>

                <div class="field">
                    <label>Data</label>
                    <input type="date">
                </div>

                <div class="field">
                    <label>Categoria</label>
                    <select>
                        <option>Estudis</option>
                        <option>Treball</option>
                    </select>
                </div>

                <div class="field">
                    <label>Prioritat</label>
                    <select>
                        <option>Baixa</option>
                        <option>Mitjana</option>
                        <option>Alta</option>
                    </select>
                </div>

                <button class="btn">Guardar</button>

            </form>
        </section>

    </section>


</body>
</html>
